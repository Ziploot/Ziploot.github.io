<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <style>
    body { background: #0b0f19; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column; gap: 16px; }
    .loader { border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top: 3px solid #818cf8; width: 30px; height: 30px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    p { color: #64748b; font-size: 13px; }
  </style>
</head>
<body>
  <div class="loader"></div>
  <p>Redirecting...</p>
  <script>
    async function redirect() {
      // Extract slug from path: /telegram -> "telegram"
      const slug = window.location.pathname.split('/').filter(Boolean).pop() || '';

      if (!slug || slug.endsWith('.html') || slug.includes('.')) {
        document.body.innerHTML = '<h2 style="font-family:sans-serif">Page not found.</h2>';
        return;
      }

      // Detect owner from hostname: ziploot.github.io -> ziploot
      const owner = window.location.hostname.split('.')[0];
      const repo  = owner + '.github.io';

      // Fetch redirects.json directly from raw GitHub (bypasses Pages CDN cache)
      const rawUrl = 'https://raw.githubusercontent.com/' + owner + '/' + repo + '/main/redirects.json?_=' + Date.now();

      try {
        const res = await fetch(rawUrl);
        if (!res.ok) throw new Error('Could not load redirects (' + res.status + ')');
        const redirects = await res.json();
        const targetUrl = redirects[slug.trim().toLowerCase()];

        if (targetUrl) {
          // Fire analytics if configured (stored in localStorage by admin panel)
          const formId      = localStorage.getItem('GOOGLE_FORM_ID');
          const ipEntry     = localStorage.getItem('ENTRY_IP');
          const slugEntry   = localStorage.getItem('ENTRY_SLUG');
          const countryEntry= localStorage.getItem('ENTRY_COUNTRY');
          const uaEntry     = localStorage.getItem('ENTRY_UA');

          if (formId && ipEntry && slugEntry && countryEntry && uaEntry) {
            try {
              const geo = await fetch('https://ipapi.co/json/');
              const gd  = await geo.json();
              const payload = new URLSearchParams();
              payload.append('entry.' + slugEntry,    slug);
              payload.append('entry.' + ipEntry,      gd.ip            || 'Unknown');
              payload.append('entry.' + countryEntry, gd.country_name  || 'Unknown');
              payload.append('entry.' + uaEntry,      navigator.userAgent);
              const formUrl = 'https://docs.google.com/forms/d/e/' + formId + '/formResponse';
              navigator.sendBeacon(formUrl, payload);
            } catch(e) {}
          }

          window.location.replace(targetUrl);
        } else {
          document.querySelector('.loader').style.display = 'none';
          document.querySelector('p').textContent = '';
          document.body.innerHTML += '<h2 style="font-family:sans-serif">Link not found: /' + slug + '</h2>';
        }
      } catch (err) {
        document.querySelector('.loader').style.display = 'none';
        document.querySelector('p').textContent = '';
        document.body.innerHTML += '<h2 style="font-family:sans-serif;color:#ef4444">Error: ' + err.message + '</h2>';
      }
    }
    redirect();
  </script>
</body>
</html>
